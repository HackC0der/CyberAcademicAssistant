<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学术智能体平台</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="sidebar-toggle" class="sidebar-toggle" title="收起侧边栏">◀</button>
                <h2>🎓 学术智能体</h2>
                <button id="new-chat-btn" title="新对话">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                </button>
            </div>

            <!-- 侧边栏标签页 -->
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="sessions">💬 会话</button>
                <button class="sidebar-tab" data-tab="settings">⚙️ 设置</button>
            </div>

            <!-- 会话列表 -->
            <div class="sidebar-panel" id="panel-sessions">
                <div id="chat-history"></div>
            </div>

            <!-- 设置面板 -->
            <div class="sidebar-panel" id="panel-settings" style="display:none;">
                <div class="settings-section">
                    <h4>模型配置</h4>
                    <div class="setting-field">
                        <label>API Base URL</label>
                        <input type="text" id="cfg-api-base" placeholder="https://api.openai.com/v1" />
                    </div>
                    <div class="setting-field">
                        <label>API Key</label>
                        <input type="password" id="cfg-api-key" placeholder="sk-..." />
                    </div>
                    <div class="setting-field">
                        <label>Model</label>
                        <input type="text" id="cfg-model" placeholder="gpt-4o-mini" />
                    </div>
                </div>
                <div class="settings-section">
                    <h4>生成参数</h4>
                    <div class="setting-field">
                        <label>Temperature: <span id="temp-value">0.7</span></label>
                        <input type="range" id="cfg-temperature" min="0" max="2" step="0.1" value="0.7" />
                    </div>
                    <div class="setting-field">
                        <label>Max Tokens: <span id="max-tokens-value">不限制</span></label>
                        <input type="range" id="cfg-max-tokens" min="0" max="16000" step="256" value="0" />
                    </div>
                </div>
                <div class="settings-section">
                    <button id="cfg-save-btn" class="settings-save-btn">💾 保存配置</button>
                    <div id="cfg-save-status" class="settings-status"></div>
                </div>
            </div>

            <!-- 底部固定栏 -->
            <div class="sidebar-footer">
                <div id="stats-info" class="stats-info">加载中...</div>
                <div class="footer-actions">
                    <button id="theme-toggle" class="footer-btn" title="切换主题">🌙</button>
                </div>
            </div>
        </aside>

        <div class="resize-handle" id="resize-handle"></div>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="chat-container" id="chat-container">
                <!-- 欢迎页 -->
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-icon">🎓</div>
                    <h1>学术智能体平台</h1>
                    <p>选择下方的智能体模式，开始你的学术探索</p>
                    <div class="mode-desc">
                        <div class="mode-card">
                            <h3>📚 文献匹配</h3>
                            <p>基于四大顶会 5500+ 论文，用自然语言描述课题，AI 语义匹配返回最相关论文。</p>
                        </div>
                        <div class="mode-card">
                            <h3>⚔️ Idea 辩论</h3>
                            <p>切换审稿人/导师人格，对你的研究想法进行批判性质疑或建设性引导，打磨核心创新点。</p>
                        </div>
                    </div>
                </div>

                <div class="messages" id="messages"></div>
            </div>

            <!-- 输入区域 -->
            <div class="input-area">
                <div class="agent-bar">
                    <div class="agent-tabs">
                        <button class="agent-tab active" data-mode="literature">📚 文献匹配</button>
                        <button class="agent-tab" data-mode="debate">⚔️ Idea 辩论</button>
                    </div>
                    <div class="persona-switch" id="persona-switch" style="display:none;">
                        <span class="persona-label">人格：</span>
                        <button class="persona-btn active" data-persona="reviewer">🔍 审稿人</button>
                        <button class="persona-btn" data-persona="mentor">🎓 导师</button>
                    </div>
                </div>

                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="描述你的研究课题..." rows="1" autofocus></textarea>
                    <input type="file" id="pdf-upload" accept=".pdf" hidden />
                    <button id="pdf-btn" title="上传 PDF" class="input-icon-btn">📎</button>
                    <button id="send-btn" title="发送">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
                <div id="pdf-indicator" class="pdf-indicator" style="display:none;">
                    <span>📄 <span id="pdf-name"></span></span>
                    <button id="pdf-clear" class="pdf-clear-btn" title="移除">×</button>
                </div>
                <div class="input-hint" id="input-hint">按 Enter 发送，Shift+Enter 换行</div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
