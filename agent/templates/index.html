<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学术智能体平台</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="sidebar-toggle" class="sidebar-toggle" title="收起侧边栏">◀</button>
                <h2 id="platform-label">🎓 学术智能体</h2>
                <div class="header-actions">
                    <div class="platform-dropdown-wrap">
                        <button class="platform-btn" id="platform-btn" title="切换平台">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M7 10l5 5 5-5"/></svg>
                        </button>
                        <div class="platform-dropdown" id="platform-dropdown">
                            <button data-platform="academic">🎓 学术智能体</button>
                            <button data-platform="polish">📝 论文润色</button>
                        </div>
                    </div>
                    <button id="new-chat-btn" title="新对话">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 侧边栏标签页 -->
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="sessions">💬 会话</button>
                <button class="sidebar-tab" data-tab="settings">⚙️ 设置</button>
            </div>

            <!-- 会话列表 -->
            <div class="sidebar-panel" id="panel-sessions">
                <div id="chat-history"></div>
            </div>

            <!-- 设置面板 -->
            <div class="sidebar-panel" id="panel-settings" style="display:none;">
                <div class="settings-section">
                    <h4>模型配置</h4>
                    <div class="setting-field">
                        <label>API Base URL</label>
                        <input type="text" id="cfg-api-base" placeholder="https://api.openai.com/v1" />
                    </div>
                    <div class="setting-field">
                        <label>API Key</label>
                        <input type="password" id="cfg-api-key" placeholder="sk-..." />
                    </div>
                    <div class="setting-field">
                        <label>Model</label>
                        <input type="text" id="cfg-model" placeholder="gpt-4o-mini" />
                    </div>
                </div>
                <div class="settings-section">
                    <h4>生成参数</h4>
                    <div class="setting-field">
                        <label>Temperature: <span id="temp-value">0.7</span></label>
                        <input type="range" id="cfg-temperature" min="0" max="2" step="0.1" value="0.7" />
                    </div>
                    <div class="setting-field">
                        <label>Max Tokens: <span id="max-tokens-value">不限制</span></label>
                        <input type="range" id="cfg-max-tokens" min="0" max="16000" step="256" value="0" />
                    </div>
                </div>
                <div class="settings-section">
                    <h4>外观</h4>
                    <div class="setting-field">
                        <label>主题</label>
                        <div class="theme-toggle-group">
                            <button class="theme-opt" data-theme="dark">🌙 暗色</button>
                            <button class="theme-opt" data-theme="light">☀️ 亮色</button>
                        </div>
                    </div>
                </div>
                <div class="settings-section">
                    <button id="cfg-save-btn" class="settings-save-btn">💾 保存配置</button>
                    <div id="cfg-save-status" class="settings-status"></div>
                </div>
            </div>

            <!-- 底部固定栏 -->
            <div class="sidebar-footer">
                <div id="stats-info" class="stats-info">加载中...</div>
            </div>
        </aside>

        <div class="resize-handle" id="resize-handle"></div>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="chat-container" id="chat-container">
                <!-- 欢迎页 -->
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-icon">🎓</div>
                    <h1>学术智能体平台</h1>
                    <p>选择下方的智能体模式，开始你的学术探索</p>
                    <div class="mode-desc">
                        <div class="mode-card">
                            <h3>📚 文献匹配</h3>
                            <p>基于四大顶会 5500+ 论文，用自然语言描述课题，AI 语义匹配返回最相关论文。</p>
                        </div>
                        <div class="mode-card">
                            <h3>⚔️ Idea 辨析</h3>
                            <p>切换审稿人/导师人格，对你的研究想法进行批判性质疑或建设性引导，打磨核心创新点。</p>
                        </div>
                        <div class="mode-card">
                            <h3>📝 求索解惑</h3>
                            <p>求索模式提问论文核心，解惑模式评判你的回答。不给答案，只指出错误，加深理解。</p>
                        </div>
                    </div>
                </div>

                <div class="messages" id="messages"></div>
                <div class="selection-bar hidden" id="selection-bar">
                    <span class="selection-count" id="selection-count">已选 0 条</span>
                    <div class="selection-actions">
                        <button class="selection-btn select-all-btn" id="select-all-btn">全选</button>
                        <button class="selection-btn export-selected-btn" id="export-selected-btn">📄 导出选中</button>
                        <button class="selection-btn cancel-btn" id="cancel-select-btn">取消</button>
                    </div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="input-area">
                <div class="agent-bar">
                    <div class="agent-tabs">
                        <button class="agent-tab active" data-mode="chat">💬 对话</button>
                        <button class="agent-tab" data-mode="literature">📚 文献匹配</button>
                        <button class="agent-tab" data-mode="debate">⚔️ Idea 辨析</button>
                        <button class="agent-tab" data-mode="quiz">📝 求索解惑</button>
                    </div>
                    <div class="agent-bar-actions">
                    </div>
                    <div class="persona-switch" id="persona-switch" style="display:none;">
                        <span class="persona-label">人格：</span>
                        <button class="persona-btn active" data-persona="reviewer">🔍 审稿人</button>
                        <button class="persona-btn" data-persona="mentor">🎓 导师</button>
                    </div>
                    <div class="persona-switch" id="quiz-persona-switch" style="display:none;">
                        <span class="persona-label">模式：</span>
                        <button class="persona-btn active" data-persona="inquiry">🔍 求索</button>
                        <button class="persona-btn" data-persona="solution">✅ 解惑</button>
                    </div>
                </div>

                <div class="input-wrapper">
                    <div id="ref-tags" class="ref-tags"></div>
                    <textarea id="user-input" placeholder="描述你的研究课题..." rows="1" autofocus></textarea>
                    <input type="file" id="pdf-upload" accept=".pdf" hidden />
                    <button id="pdf-btn" title="上传 PDF" class="icon-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="12" y1="18" x2="12" y2="12"/>
                            <line x1="9" y1="15" x2="15" y2="15"/>
                        </svg>
                    </button>
                    <div class="export-dropdown-wrap">
                        <button class="icon-btn" id="export-btn" title="导出对话">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                        </button>
                        <div class="export-dropdown" id="export-dropdown">
                            <button data-export="pdf-all">📄 PDF 导出全部</button>
                            <button data-export="pdf-select">☐ PDF 选择导出</button>
                            <button data-export="md-all">📝 Markdown 导出全部</button>
                            <button data-export="md-select">☐ Markdown 选择导出</button>
                        </div>
                    </div>
                    <button id="send-btn" title="发送">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
                <div class="input-hint" id="input-hint">按 Enter 发送，Shift+Enter 换行</div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
